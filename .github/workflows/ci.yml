name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend (build check)
        working-directory: backend
        run: |
          python -m pip install -U pip setuptools wheel build
          python -m build --wheel --outdir dist
          python -m pip install -e ".[dev]"

      - name: Upload backend wheel
        uses: actions/upload-artifact@v4
        with:
          name: backend-wheel
          path: backend/dist/*.whl
          if-no-files-found: error
          retention-days: 7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

      - name: Build backend Docker image
        working-directory: backend
        run: docker build -t fieldfriends-backend:${{ github.sha }} .

  unit-test:
    name: unit-test
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend with dev deps
        working-directory: backend
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Run pytest
        working-directory: backend
        env:
          TEST_DATABASE_URL: "sqlite+pysqlite:///./test.db"
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" == "main" ]] || \
             [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            python -m pytest --cov-fail-under=90 -q
          else
            python -m pytest -q
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  dependency-scan:
    name: dependency-scan
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit

      - name: Audit Python dependencies (pip-audit)
        working-directory: backend
        run: pip-audit --strict --progress-spinner off

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  code-scan:
    name: code-scan
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep security-audit
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/secrets \
            --exclude=backend/tests \
            --severity=ERROR \
            --error \
            .
