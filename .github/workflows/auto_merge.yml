name: Auto Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - uses: actions/checkout@v4

      - name: Check if all tests passed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha
            });
            const testCheck = checks.data.check_runs.find(run => run.name === 'pytest');
            const scanCheck = checks.data.check_runs.find(run => run.name === 'scan');
            const bothPassed = testCheck && testCheck.conclusion === 'success' && scanCheck && scanCheck.conclusion === 'success';
            core.setOutput('has_both_passed', bothPassed.toString());

      - name: Enable auto-merge
        if: steps.check.outputs.has_both_passed == 'true'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: squash
          pull-request-number: ${{ github.event.number }}
