name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Manual action to perform"
        type: choice
        required: true
        options:
          - rollback
      version:
        description: "Release tag to rollback to (e.g. v2024.01.01-abc1234). Leave blank to use the second-most-recent release."
        type: string
        required: false
        default: ""

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  security-events: write

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: fieldfriends-backend
  APP_RUNNER_SERVICE: fieldfriends-backend

jobs:
  # ---------------------------------------------------------------------------
  # Post-merge automated verification chain (push to main only).
  # ---------------------------------------------------------------------------
  build-test:
    name: build-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build backend wheel
        working-directory: backend
        run: |
          python -m pip install -U pip setuptools wheel build
          python -m build --wheel --outdir dist
          python -m pip install -e ".[dev]"

      - name: Upload backend wheel
        uses: actions/upload-artifact@v4
        with:
          name: backend-wheel
          path: backend/dist/*.whl
          if-no-files-found: error
          retention-days: 30

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build backend Docker image
        working-directory: backend
        run: docker build -t fieldfriends-backend:${{ steps.meta.outputs.image_tag }} .

  unit-test:
    name: unit-test
    needs: build-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend with dev deps
        working-directory: backend
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Run pytest with coverage gate
        working-directory: backend
        env:
          TEST_DATABASE_URL: "sqlite+pysqlite:///./test.db"
        run: python -m pytest --cov-fail-under=90 -q

  dependency-scan:
    name: dependency-scan
    needs: build-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit

      - name: Audit Python dependencies (pip-audit)
        working-directory: backend
        run: |
          mkdir -p reports
          pip-audit --skip-editable --progress-spinner off \
            --format json --output reports/pip-audit.json
          pip-audit --skip-editable --progress-spinner off \
            --format columns | tee reports/pip-audit.txt

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: backend/reports/pip-audit.*
          if-no-files-found: warn
          retention-days: 90

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Audit npm dependencies
        working-directory: frontend
        run: |
          mkdir -p reports
          npm audit --audit-level=high --json > reports/npm-audit.json || NPM_AUDIT_FAILED=$?
          npm audit --audit-level=high | tee reports/npm-audit.txt || true
          exit ${NPM_AUDIT_FAILED:-0}

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/reports/npm-audit.*
          if-no-files-found: warn
          retention-days: 90

  code-scan:
    name: code-scan
    needs: build-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep security-audit
        run: |
          mkdir -p reports
          semgrep scan \
            --config=p/security-audit \
            --config=p/secrets \
            --exclude=backend/tests \
            --severity=ERROR \
            --sarif --output reports/semgrep.sarif \
            --error \
            .

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep.*
          if-no-files-found: warn
          retention-days: 90

      - name: Upload Semgrep SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/semgrep.sarif
          category: semgrep

  # ---------------------------------------------------------------------------
  # Automated release: runs after all checks pass.
  # Pushes the Docker image to ECR, builds the production frontend (with
  # VITE_API_URL), and attaches frontend-dist.zip to the GitHub Release so
  # it can be used for both deploy and future rollbacks.
  # ---------------------------------------------------------------------------
  release:
    name: release
    needs: [build-test, unit-test, dependency-scan, code-scan]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      image: ${{ steps.push.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute release tag
        id: tag
        run: echo "tag=v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image to ECR
        id: push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-test.outputs.image_tag }}
        working-directory: backend
        run: |
          IMAGE="$REGISTRY/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build production frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.FRONTEND_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Package frontend dist
        run: zip -r frontend-dist.zip frontend/dist

      - name: Upload frontend package as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-zip
          path: frontend-dist.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release with frontend asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: frontend-dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Staging deploy: runs immediately after release.
  # ZAP runs against staging so test data never reaches production.
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: deploy-staging
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    outputs:
      service_url: ${{ steps.url.outputs.url }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend to staging App Runner
        run: |
          aws apprunner update-service \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
            --source-configuration "ImageRepository={ImageIdentifier=${{ needs.release.outputs.image }},ImageRepositoryType=ECR,ImageConfiguration={Port=8000}}"

      - name: Wait for staging App Runner deployment to finish
        run: |
          for _ in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
              --query "Service.Status" --output text)
            echo "App Runner status: $STATUS"
            case "$STATUS" in
              RUNNING) exit 0 ;;
              OPERATION_IN_PROGRESS) sleep 15 ;;
              *) echo "::error::Staging App Runner ended in unexpected status: $STATUS"; exit 1 ;;
            esac
          done
          echo "::error::Timed out waiting for staging App Runner deployment"
          exit 1

      - name: Get staging App Runner URL
        id: url
        run: |
          URL=$(aws apprunner describe-service \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
            --query "Service.ServiceUrl" --output text)
          echo "url=https://$URL" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Automated deploy: runs after dast-scan passes on staging.
  # ---------------------------------------------------------------------------
  deploy:
    name: deploy
    needs: [release, dast-scan]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend to AWS App Runner
        run: |
          aws apprunner update-service \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
            --source-configuration "ImageRepository={ImageIdentifier=${{ needs.release.outputs.image }},ImageRepositoryType=ECR,ImageConfiguration={Port=8000}}"

      - name: Wait for App Runner deployment to finish
        run: |
          for _ in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
              --query "Service.Status" --output text)
            echo "App Runner status: $STATUS"
            case "$STATUS" in
              RUNNING) exit 0 ;;
              OPERATION_IN_PROGRESS) sleep 15 ;;
              *) echo "::error::App Runner ended in unexpected status: $STATUS"; exit 1 ;;
            esac
          done
          echo "::error::Timed out waiting for App Runner deployment"
          exit 1

      - name: Download frontend package
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-zip

      - name: Deploy frontend to S3 and CloudFront
        run: |
          unzip frontend-dist.zip
          aws s3 sync frontend/dist/ "s3://${{ secrets.FRONTEND_BUCKET }}/" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

  # ---------------------------------------------------------------------------
  # DAST: ZAP Full Scan against the live deployment.
  # Runs after deploy so the target is the freshly promoted production build.
  # Reports are uploaded as artifacts; findings are also pushed to GitHub Code
  # Scanning via SARIF so they appear alongside Semgrep results.
  # ---------------------------------------------------------------------------
  dast-scan:
    name: dast-scan
    needs: deploy-staging
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.11.0
        with:
          target: ${{ needs.deploy-staging.outputs.service_url }}
          artifact_name: zap-report
          allow_issue_writing: true
          fail_action: true

      - name: Upload ZAP SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: zap

  # ---------------------------------------------------------------------------
  # Manual rollback: restores a previous release for both backend and frontend.
  # The release tag encodes the git SHA (format: vYYYY.MM.DD-<sha>), so the
  # ECR image tag is derived from it. The frontend is downloaded from the
  # corresponding GitHub Release asset.
  # ---------------------------------------------------------------------------
  rollback:
    name: rollback (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'rollback'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve rollback target
        id: target
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.version }}"
          if [[ -z "$TAG" ]]; then
            echo "No version provided; resolving second-most-recent release..."
            TAG=$(gh release list --repo "${{ github.repository }}" --limit 2 --json tagName --jq '.[1].tagName')
          fi
          if [[ -z "$TAG" || "$TAG" == "null" ]]; then
            echo "::error::Could not resolve a rollback release tag. Provide one via the 'version' input."
            exit 1
          fi
          # Tag format: vYYYY.MM.DD-<7-char sha> — extract the SHA suffix.
          SHA="${TAG##*-}"
          IMAGE="$REGISTRY/${ECR_REPOSITORY}:${SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Verify rollback image exists in ECR
        run: |
          aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${{ steps.target.outputs.sha }}"

      - name: Rollback App Runner to previous image
        run: |
          aws apprunner update-service \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
            --source-configuration "ImageRepository={ImageIdentifier=${{ steps.target.outputs.image }},ImageRepositoryType=ECR,ImageConfiguration={Port=8000}}"

      - name: Wait for App Runner rollback to finish
        run: |
          for _ in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
              --query "Service.Status" --output text)
            echo "App Runner status: $STATUS"
            case "$STATUS" in
              RUNNING) exit 0 ;;
              OPERATION_IN_PROGRESS) sleep 15 ;;
              *) echo "::error::App Runner ended in unexpected status: $STATUS"; exit 1 ;;
            esac
          done
          echo "::error::Timed out waiting for App Runner rollback"
          exit 1

      - name: Download frontend from release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.target.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "frontend-dist.zip"
          unzip frontend-dist.zip

      - name: Rollback frontend on S3 and invalidate CloudFront
        run: |
          aws s3 sync frontend/dist/ "s3://${{ secrets.FRONTEND_BUCKET }}/" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

      - name: Announce rollback
        run: echo "Rolled back to release ${{ steps.target.outputs.tag }}"
