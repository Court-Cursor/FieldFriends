name: Auto Reply to Issues

on:
  issues:
    types: [opened]

jobs:
  auto-reply:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Auto Reply with AI
        uses: actions/github-script@v7
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_MODEL: ${{ vars.BOT_AI_MODEL }}
        with:
          script: |
            const issueNumber = context.issue.number;
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || '';
            const issueAuthor = context.payload.issue.user.login;
            
            // Get recent commits to understand recent changes
            const commits = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 5
            });
            
            const recentCommits = commits.data.map(c => c.commit.message).join('\n');
            
            // Get repository README if available
            let readme = '';
            try {
              const readmeResponse = await github.rest.repos.getReadme({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              readme = Buffer.from(readmeResponse.data.content, 'base64').toString('utf-8');
            } catch (e) {
              console.log('No README found');
            }
            
            // Get repository structure
            let repoStructure = '';
            try {
              const tree = await github.rest.git.getTree({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tree_sha: 'HEAD',
                recursive: false
              });
              repoStructure = tree.data.tree.map(item => `${item.path} (${item.type})`).join('\n');
            } catch (e) {
              console.log('Could not fetch repo structure');
            }
            
            // Prepare context for AI
            const prompt = `You are a helpful GitHub bot assisting with issue triage and providing initial debugging recommendations.
            
            Repository: ${context.repo.owner}/${context.repo.repo}
            
            Repository Structure:
            ${repoStructure.substring(0, 500)}
            
            README (first 1000 chars):
            ${readme.substring(0, 1000)}
            
            Recent Commits:
            ${recentCommits}
            
            NEW ISSUE:
            Title: ${issueTitle}
            Author: ${issueAuthor}
            
            Description:
            ${issueBody}
            
            Please provide:
            1. A brief analysis of the issue
            2. Potential causes or areas to investigate
            3. Debugging steps or recommendations
            4. Any relevant questions to help narrow down the problem
            
            Keep your response helpful, concise, and friendly. Acknowledge this is an automated response and that a human maintainer will follow up.`;
            
            // Call OpenRouter API
            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.OPENROUTER_API_KEY}`,
                'Content-Type': 'application/json',
                'HTTP-Referer': `https://github.com/${context.repo.owner}/${context.repo.repo}`,
                'X-Title': 'GitHub Issue Auto-Responder'
              },
              body: JSON.stringify({
                model: process.env.AI_MODEL,
                messages: [
                  {
                    role: 'user',
                    content: prompt
                  }
                ],
                max_tokens: 800,
                temperature: 0.7
              })
            });
            
            if (!response.ok) {
              const error = await response.text();
              console.error('OpenRouter API Error:', error);
              throw new Error(`OpenRouter API failed: ${response.status}`);
            }
            
            const data = await response.json();
            const aiResponse = data.choices[0].message.content;
            
            // Post comment on the issue
            const comment = `🤖 **Automated Initial Response**
            
            Hi @${issueAuthor}! Thanks for opening this issue. Here's an automated analysis to help get things started:
            
            ${aiResponse}
            
            ---
            
            *This is an automated response. A maintainer will review your issue and provide further assistance soon.*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });
            
            console.log('Successfully posted AI-generated reply to issue #' + issueNumber);
